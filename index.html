<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Issues Tracker</title>

    <!-- daisyUI and Tailwind CSS -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="styles/style.css">
</head>

<body class="min-h-screen flex items-center">

    <div
        class="login card bg-base-100 w-full max-w-sm shrink-0 shadow-2xl mx-auto rounded-2xl hover:scale-105 transition-all duration-700">
        <div class="card-body">
            <div class="py-8 flex flex-col items-center space-y-5">
                <img src="assets/github-logo.png" alt="">
                <div class="text-center">
                    <h3>GitHub Issues Tracker</h3>
                    <p>Sign in to manage your issues</p>
                </div>
            </div>
            <fieldset class="fieldset">
                <label class="label text-neutral ">Username</label>
                <input id="username" class="input border-0 rounded-full bg-base-200" placeholder="Enter Username" />
                <label class="label text-neutral  ">Password</label>
                <input id="password" type="password" class="input border-0 rounded-full bg-base-200"
                    placeholder="Enter Password" />
                <button id="login-btn" class="btn btn-primary mt-4 rounded-md">Login</button>
            </fieldset>
            <div class="flex items-center gap-x-1 ">
                <hr class="w-[50%] opacity-30">
                <p>OR</p>
                <hr class="w-[50%] opacity-30">
            </div>
            <div class="space-y-3 my-5">
                <h4 class="text-base-content/70 text-center">Demo Credentials:</h4>
                <div class="bg-gray-100 rounded-xl p-5 flex justify-center">
                    <div>
                        <p><span class="font-bold">Username:</span> admin</p>
                        <p><span class="font-bold">Password:</span> admin123</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
    </main>

    <script src="scripts/index.js"></script>
</body>

</html>
