<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Issues Tracker</title>

    <!-- daisyUI and Tailwind CSS -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <!-- Custom CSS -->
    <link rel="stylesheet" href="styles/style.css">
</head>

<body class="bg-[#F8FAFC] h-full">
    <header class="flex justify-between items-center py-5 px-20 bg-white shadow-sm">
        <div class="flex items-center gap-2">
            <img width="30px" src="assets/github-logo.png" alt="">
            <h2 class="text-2xl font-semibold">GitHub Issues Tracker</h2>
        </div>
        <div>
            <div class="join flex gap-2 ">
                <div>
                    <label class="input validator join-item rounded-sm focus:outline-none focus:ring-0">
                        <i class="fa-solid fa-magnifying-glass opacity-50"></i>
                        <input id="input-search" type="text" class="input focus:outline-none focus:ring-0"
                            placeholder="Enter Your Name" />
                    </label>
                </div>
                <button id="btn-search" class="btn btn-primary join-item rounded-sm"><i class="fa-solid fa-plus"></i>
                    New Issue</button>
            </div>
        </div>
    </header>

    <main class="w-10/12 mx-auto ">
        <section class="flex gap-3 bg-white my-10 p-5 shadow rounded-md">
            <button onclick="switchTab('allBtn')" id="tab-allBtn" class="px-10 btn btn-primary">All</button>
            <button onclick="switchTab('openBtn')" id="tab-openBtn" class="px-10 btn btn-primary btn-soft">Open</button>
            <button onclick="switchTab('closedBtn')" id="tab-closedBtn"
                class="px-10 btn btn-primary btn-soft">Closed</button>
        </section>

        <section class="flex justify-between items-center bg-white mt-10 p-5 shadow rounded-md">
            <div class="flex items-center gap-3">
                <div>
                    <img src="assets/Aperture.png" alt="">
                </div>
                <div>
                    <h3 class="text-xl font-semibold"><span id="state">0</span> Issues</h3>
                    <p class="text-base-content/50">Track and manage your project issues</p>
                </div>
            </div>
            <div class="flex gap-3">
                <div class="flex items-center gap-1">
                    <div class="w-2 h-2 rounded-full bg-green-500"></div>
                    <p class="font-medium">Open</p>
                </div>
                <div class="flex items-center gap-1">
                    <div class="w-2 h-2 rounded-full bg-purple-500"></div>
                    <p class="font-medium">Close</p>
                </div>
            </div>
        </section>

        <section id="all-card-section" class="bg-white shadow rounded-sm mt-1 p-5 grid grid-cols-4 gap-5">
            <!-- <div class="card card-body border-t-4 border-green-500 shadow-md space-y-5">
                <div class="flex justify-between">
                    <img src="assets/Open-Status.png" alt="">
                    <div class="badge badge-error bg-error/30">High</div>
                </div>
                <div>
                    <h4 class="text-lg font-semibold">Fix navigation menu on mobile devices</h4>
                    <p class="text-sm text-base-content/50">The navigation menu doesn't collapse properly on mobile
                        devices...</p>
                </div>
                <div class="flex gap-3">
                    <div class="badge badge-error bg-error/30"><i class="fa-solid fa-bug"></i> Bug</div>
                    <div class="badge badge-warning bg-warning/30"><i class="fa-regular fa-life-ring"></i> help wanted
                    </div>
                </div>
                <hr class="-mx-6 opacity-20">
                <div class="text-base-content/50 text-sm">
                    <p>#1 by john_doe</p>
                    <p>1/15/2024</p>
                </div>
            </div> -->
        </section>

        <section id="open-card-section" class="bg-white shadow rounded-sm mt-1 p-5 grid grid-cols-4 gap-5 hidden">
        </section>

        <section id="closed-card-section" class="bg-white shadow rounded-sm mt-1 p-5 grid grid-cols-4 gap-5 hidden">
        </section>
    </main>

    <script src="scripts/home.js"></script>
</body>

</html>
